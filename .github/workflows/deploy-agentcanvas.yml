name: Deploy AgentCanvas

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-agentcanvas
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build AgentCanvas frontend
        working-directory: frontend
        run: npm run build:agentcanvas

      - name: Deploy AgentCanvas worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "::error::Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "::error::Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          npx wrangler@4.103.0 deploy --config wrangler.agentcanvas.jsonc
